{% extends "base.html" %}
{% block title %}Students — AttendanceAI{% endblock %}

{% block sidebar_nav %}
<a href="{{ url_for('admin.dashboard') }}" class="nav-item"><span class="nav-icon"><i class="fas fa-gauge-high"></i></span><span>Dashboard</span></a>
<a href="{{ url_for('admin.students') }}" class="nav-item active"><span class="nav-icon"><i class="fas fa-graduation-cap"></i></span><span>Students</span></a>
<a href="{{ url_for('admin.teachers') }}" class="nav-item"><span class="nav-icon"><i class="fas fa-chalkboard-user"></i></span><span>Teachers</span></a>
<a href="{{ url_for('admin.departments') }}" class="nav-item"><span class="nav-icon"><i class="fas fa-building"></i></span><span>Departments</span></a>
<a href="{{ url_for('admin.classes') }}" class="nav-item"><span class="nav-icon"><i class="fas fa-book-open"></i></span><span>Classes</span></a>
<a href="{{ url_for('admin.attendance') }}" class="nav-item"><span class="nav-icon"><i class="fas fa-calendar-check"></i></span><span>Attendance</span></a>
<a href="{{ url_for('admin.reports') }}" class="nav-item"><span class="nav-icon"><i class="fas fa-file-chart-column"></i></span><span>Reports</span></a>
<a href="{{ url_for('analytics.dashboard') }}" class="nav-item"><span class="nav-icon"><i class="fas fa-chart-line"></i></span><span>Analytics</span></a>
<a href="{{ url_for('admin.audit_logs') }}" class="nav-item"><span class="nav-icon"><i class="fas fa-scroll"></i></span><span>Audit Logs</span></a>
<a href="{{ url_for('admin.settings') }}" class="nav-item"><span class="nav-icon"><i class="fas fa-gear"></i></span><span>Settings</span></a>
{% endblock %}

{% block page_title %}Students{% endblock %}

{% block content %}
<div class="card mb-6">
    <div class="card-body" style="padding: 16px 24px;">
        <form method="GET" style="display: flex; gap: 12px; flex-wrap: wrap; align-items: center;">
            <div class="search-wrap" style="flex: 1; min-width: 200px;">
                <i class="fas fa-search"></i>
                <input type="text" name="search" class="form-control" placeholder="Search by name, email, roll number..." value="{{ search }}">
            </div>
            <select name="department" class="form-control" style="width: 180px;">
                <option value="">All Departments</option>
                {% for dept in departments %}<option value="{{ dept.id }}" {{ 'selected' if dept_filter == dept.id|string }}>{{ dept.name }}</option>{% endfor %}
            </select>
            <select name="status" class="form-control" style="width: 150px;">
                <option value="">All Status</option>
                <option value="pending" {{ 'selected' if status_filter == 'pending' }}>Pending</option>
                <option value="approved" {{ 'selected' if status_filter == 'approved' }}>Approved</option>
                <option value="face_registered" {{ 'selected' if status_filter == 'face_registered' }}>Face Registered</option>
            </select>
            <button type="submit" class="btn btn-primary"><i class="fas fa-filter"></i> Filter</button>
            <a href="{{ url_for('admin.students') }}" class="btn btn-secondary">Clear</a>
        </form>
    </div>
</div>
